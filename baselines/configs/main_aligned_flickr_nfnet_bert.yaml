base_config: default.yaml

protocol_name: main_aligned_flickr_nfnet_bert
evaluation_protocol: main_aligned_pair_selection_v1

dataset_name: flickr
split: train
image_encoder: nfnet
text_encoder: bert
sample_unit: pair_level

feature_source: artifacts/feature_cache
joint_feature_mode: concat

output_root: artifacts/baselines
log_root: artifacts/baselines/logs
cache_root: artifacts/baselines/cache

budgets: [100, 200, 500]
methods: [entropy, el2n, grand, gradmatch, glister, ccs-rand, ccs-herd, ccs-kcenter, ccs-forget, dq, dfool, nms, adap_sne]
default_seed: 0
default_seeds: [0]
default_device: cpu
default_num_workers: 4

pair_score_fusion: weighted_sum
score_normalization: zscore
pair_score_weights: [0.5, 0.5, 0.0]

local_node_confidence: off
wavelet: on
lsrc: on
grouped_loss: on
matching_fused_cost: on
